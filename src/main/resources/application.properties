spring.application.name=RailwayTicketsSystem
# Змінили назву бази з Postgres на app
spring.datasource.url=jdbc:postgresql://localhost:5432/app?TimeZone=UTC

spring.datasource.username=postgres
# Змінили пароль на той, що в контейнері
spring.datasource.password=12345678
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

train.tariffs.base-rate=180.00

# 2. Задаємо коефіцієнти для нашого Enum ComfortType (це буде Map<ComfortType, BigDecimal>)
train.tariffs.multipliers.eco.=75
train.tariffs.multipliers.comfort.=100
train.tariffs.multipliers.super-comfort.=150
